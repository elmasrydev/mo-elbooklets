appId: com.elbooklets.app
---
# Launch app without clearing state/keychain - the setup-environment flow handles logout
- launchApp

# Switch environment if needed
- runFlow:
    file: ../utils/setup-environment.yaml

# Execute student registration flow (only on non-prod)
- runFlow:
    when:
      true: ${TARGET_ENV != 'prod'}
    file: ../utils/student-register-flow.yaml
