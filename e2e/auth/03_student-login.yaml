appId: com.elbooklets.app
---
# Launch app without clearing state/keychain (Expo dev client needs them)
- launchApp

# Switch environment if needed
- runFlow:
    file: ../utils/setup-environment.yaml

# Execute student login flow
- assertVisible:
    id: "onboarding-student-tab"
- tapOn:
    id: "onboarding-sign-in"
- assertVisible:
    id: "login-mobile-input"
- tapOn:
    id: "login-mobile-input"
- inputText: ${STUDENT_MOBILE}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "login-password-input"
- inputText: ${STUDENT_PASSWORD}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "login-submit-button"

# Wait for login API response & screen transition
- runScript:
    file: ../utils/sleep.js
    env:
      timeout: 2000

# Dismiss rate-limit / warning popup if it appears
- runFlow:
    when:
      visible:
        id: "confirm-modal-ok"
    commands:
      - tapOn:
          id: "confirm-modal-ok"
      - runScript:
          file: ../utils/sleep.js
          env:
            timeout: 1500

# Skip OTP using debug bypass button if it appears (Phase 1 or 2)
- runFlow:
    when:
      visible:
        id: "otp-skip-debug"
    commands:
      - tapOn:
          id: "otp-skip-debug"
- runFlow:
    when:
      visible:
        id: "otp-skip-debug-2"
    commands:
      - tapOn:
          id: "otp-skip-debug-2"

# Wait for profile completion modal to auto-show and dismiss it
- runScript:
    file: ../utils/sleep.js
    env:
      timeout: 6000
- runFlow:
    when:
      visible:
        id: "profile-completion-skip-button"
    commands:
      - tapOn:
          id: "profile-completion-skip-button"

- assertVisible:
    id: "tab-home"
- takeScreenshot: e2e/screenshots/student-login-result
