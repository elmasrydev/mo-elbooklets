appId: com.elbooklets.app
---
- launchApp

# Switch environment if needed
- runFlow:
    file: ../utils/setup-environment.yaml



# Execute parent login flow
- assertVisible:
    id: "onboarding-parent-tab"
- tapOn:
    id: "onboarding-parent-tab"
- tapOn:
    id: "onboarding-sign-in"
- assertVisible:
    id: "parent-login-mobile"
- tapOn:
    id: "parent-login-mobile"
- inputText: ${PARENT_MOBILE}
- tapOn:
    point: 50%,10%
# Prod build: password field defaults to secure; reveal it so the strong password
# (incl. its symbol) types reliably. Debug builds render it visible already (prod-only).
- runFlow:
    when:
      true: ${TARGET_ENV == 'prod'}
    commands:
      - tapOn:
          id: "parent-login-toggle-password"
- tapOn:
    id: "parent-login-password"
- inputText: ${PARENT_PASSWORD}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "parent-login-submit"

# Dismiss a rate-limit / error popup if it appears
- extendedWaitUntil:
    optional: true
    visible:
      id: "confirm-modal-ok"
    timeout: 2000
- runFlow:
    when:
      visible:
        id: "confirm-modal-ok"
    commands:
      - tapOn:
          id: "confirm-modal-ok"
      - extendedWaitUntil:
          notVisible:
            id: "confirm-modal-ok"
          timeout: 3000

# Parents land directly on ParentDashboard (no OTP)
- extendedWaitUntil:
    visible:
      id: "parent-dashboard-add-child-fab"
    timeout: 15000
- takeScreenshot: e2e/screenshots/parent-login-result
