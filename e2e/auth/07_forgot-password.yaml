appId: com.elbooklets.app
---
- launchApp

# Switch environment if needed
- runFlow:
    file: ../utils/setup-environment.yaml

# Execute Forgot Password flow
- assertVisible:
    id: "onboarding-student-tab"
- tapOn:
    id: "onboarding-sign-in"
- assertVisible:
    id: "login-forgot-password"
- tapOn:
    id: "login-forgot-password"
- assertVisible:
    id: "forgot-email-input"
- tapOn:
    id: "forgot-email-input"
- inputText: "test@elbooklets.com"
- tapOn:
    point: 50%,10%
- tapOn:
    id: "forgot-submit-button"
# Smoke-level only: assert the screen submits and shows a response modal, then
# dismiss it. We deliberately do NOT assert success (return-to-Login): students
# register without an email, and the backend returns failure for unknown emails
# (no generic-success), so a real success can't be reliably triggered in E2E
# without a seeded, registered email. Verifying submit+response is the portable scope.
- assertVisible:
    id: "confirm-modal-title"
- assertVisible:
    id: "confirm-modal-ok"
- tapOn:
    id: "confirm-modal-ok"
- takeScreenshot: e2e/screenshots/forgot-password-result
