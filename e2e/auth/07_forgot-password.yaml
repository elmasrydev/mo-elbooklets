appId: com.elbooklets.app
---
- launchApp

# Switch environment if needed
- runFlow:
    file: ../utils/setup-environment.yaml

# Execute Forgot Password flow
- assertVisible:
    id: "onboarding-student-tab"
- tapOn:
    id: "onboarding-sign-in"
- assertVisible:
    id: "login-forgot-password"
- tapOn:
    id: "login-forgot-password"
- assertVisible:
    id: "forgot-email-input"
- tapOn:
    id: "forgot-email-input"
- inputText: "test@elbooklets.com"
- tapOn:
    point: 50%,10%
- tapOn:
    id: "forgot-submit-button"
# A confirm modal appears for both success and failure, so don't stop at it —
# on SUCCESS its OK runs navigation.goBack() returning to Login; on FAILURE it
# stays on the forgot-password screen. Tap OK and assert we returned to Login,
# which is only true on success (removes the previous false-green).
- extendedWaitUntil:
    visible:
      id: "confirm-modal-ok"
    timeout: 8000
- tapOn:
    id: "confirm-modal-ok"
- extendedWaitUntil:
    visible:
      id: "login-mobile-input"
    timeout: 8000
- takeScreenshot: e2e/screenshots/forgot-password-result
