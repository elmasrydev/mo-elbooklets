appId: com.elbooklets.app
---
# --- Parent Login & Logout Flow ---
- launchApp

# Switch environment if needed / self-heal to Onboarding
- runFlow:
    file: ../utils/setup-environment.yaml

# Log in as parent
- assertVisible:
    id: "onboarding-parent-tab"
- tapOn:
    id: "onboarding-parent-tab"
- tapOn:
    id: "onboarding-sign-in"
- assertVisible:
    id: "parent-login-mobile"
- tapOn:
    id: "parent-login-mobile"
- inputText: ${PARENT_MOBILE}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "parent-login-password"
- inputText: ${PARENT_PASSWORD}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "parent-login-submit"

# Dismiss a rate-limit / error popup if it appears
- extendedWaitUntil:
    optional: true
    visible:
      id: "confirm-modal-ok"
    timeout: 2000
- runFlow:
    when:
      visible:
        id: "confirm-modal-ok"
    commands:
      - tapOn:
          id: "confirm-modal-ok"
      - extendedWaitUntil:
          notVisible:
            id: "confirm-modal-ok"
          timeout: 3000

# Parents land on ParentDashboard — open settings via the header gear, then log out
- extendedWaitUntil:
    visible:
      id: "parent-dashboard-settings-button"
    timeout: 15000
- tapOn:
    id: "parent-dashboard-settings-button"
- scrollUntilVisible:
    element:
      id: "parent-settings-logout-item"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "parent-settings-logout-item"
- extendedWaitUntil:
    visible:
      id: "confirm-modal-ok"
    timeout: 5000
- tapOn:
    id: "confirm-modal-ok"
- extendedWaitUntil:
    visible:
      id: "onboarding-parent-tab"
    timeout: 10000
- takeScreenshot: e2e/screenshots/parent-logout-success
