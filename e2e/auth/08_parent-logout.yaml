appId: com.elbooklets.app
---
# Switch environment if needed
- runFlow:
    file: ../utils/setup-environment.yaml

# --- Parent Login & Logout Flow ---
- launchApp

# Switch environment if needed (since state was cleared)
- runFlow:
    file: ../utils/setup-environment.yaml

- assertVisible:
    id: "onboarding-parent-tab"
- tapOn:
    id: "onboarding-parent-tab"
- tapOn:
    id: "onboarding-sign-in"
- assertVisible:
    id: "parent-login-mobile"
- tapOn:
    id: "parent-login-mobile"
- inputText: ${PARENT_MOBILE}
- tapOn:
    id: "parent-login-password"
- inputText: ${PARENT_PASSWORD}
- tapOn:
    id: "parent-login-submit"
- assertVisible:
    id: "parent-settings-logout-item"

# Parents redirect to the ParentStack containing ParentSettingsScreen
- assertVisible:
    id: "parent-settings-logout-item"
- tapOn:
    id: "parent-settings-logout-item"
- assertVisible:
    id: "confirm-modal-ok"
- tapOn:
    id: "confirm-modal-ok"
- assertVisible:
    id: "onboarding-parent-tab"
- takeScreenshot: e2e/screenshots/parent-logout-success
