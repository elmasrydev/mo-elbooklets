# e2e/env.yaml
# Environment variables for Maestro E2E tests
#
# NOTE: Strong-password validation is enforced on EVERY environment (debug + prod),
# so the test password must satisfy STRONG_PASSWORD_REGEX (>=8 chars, upper, lower,
# digit, symbol). `DemoPass1!` is a throwaway test credential — never a real user's.

# Universal test OTP (forwarded to flows by run_maestro). On debug builds the OTP-skip
# buttons are used instead; on the prod/test backend the verification code is 123456.
OTP_CODE: "123456"

# --- PRS Environment ---
PRS_STUDENT_MOBILE: "01007867184"
PRS_STUDENT_PASSWORD: "DemoPass1!"
PRS_PARENT_MOBILE: "01007867181"
PRS_PARENT_PASSWORD: "DemoPass1!"

# --- Dev/Demo Environment ---
DEV_STUDENT_MOBILE: "01007867184"
DEV_STUDENT_PASSWORD: "DemoPass1!"
DEV_PARENT_MOBILE: "01007867181"
DEV_PARENT_PASSWORD: "DemoPass1!"

# --- Production Environment ---
# Throwaway accounts created during prod E2E (deleted afterwards). OTP on prod = 123456.
# Use controlled numbers (not random) so prod registration never messages a real user.
PROD_STUDENT_MOBILE: "01004548105"
PROD_STUDENT_PASSWORD: "DemoPass1!"
PROD_PARENT_MOBILE: "01004548106"
PROD_PARENT_PASSWORD: "DemoPass1!"
PROD_PARENT_EMAIL: "maestro.parent.prod1@example.com"
