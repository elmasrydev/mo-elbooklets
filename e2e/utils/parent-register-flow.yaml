appId: com.elbooklets.app
---
# e2e/auth/parent-register-flow.yaml
# Actual registration steps run conditionally

- assertVisible:
    id: "onboarding-parent-tab"
- tapOn:
    id: "onboarding-parent-tab"
- tapOn:
    id: "onboarding-get-started"
- assertVisible:
    id: "parent-register-name"
# Dismiss the keyboard (tap top of screen) after every field — otherwise the
# keyboard covers the lower inputs and their taps land on the keyboard, sending
# the next inputText into the previously-focused field.
- tapOn:
    id: "parent-register-name"
- inputText: "Maestro Parent"
- tapOn:
    point: 50%,10%
- tapOn:
    id: "parent-register-mobile"
- inputText: ${PARENT_MOBILE}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "parent-register-email"
- inputText: ${PARENT_EMAIL}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "parent-register-password"
- inputText: ${PARENT_PASSWORD}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "parent-register-confirm"
- inputText: ${PARENT_PASSWORD}
- tapOn:
    point: 50%,10%
- tapOn:
    id: "parent-register-submit"

# Parents land directly on ParentDashboard (no OTP, no profile prompt).
# Dismiss a rate-limit / error popup if the backend returns one.
- extendedWaitUntil:
    optional: true
    visible:
      id: "confirm-modal-ok"
    timeout: 2000
- runFlow:
    when:
      visible:
        id: "confirm-modal-ok"
    commands:
      - tapOn:
          id: "confirm-modal-ok"
      - extendedWaitUntil:
          notVisible:
            id: "confirm-modal-ok"
          timeout: 3000

- extendedWaitUntil:
    visible:
      id: "parent-dashboard-add-child-fab"
    timeout: 15000
- takeScreenshot: e2e/screenshots/parent-register-result
