# e2e/utils/setup-environment.yaml
# Reusable subflow to switch environment dynamically in Maestro E2E
appId: com.elbooklets.app
---
# Wait for app boot — continues as soon as Onboarding is ready (common case),
# falls through after 10s max so the self-healing checks below can handle other states
- extendedWaitUntil:
    optional: true
    visible:
      id: "onboarding-language-toggle"
    timeout: 10000

# Dismiss any iOS system dialogs (Apple Account Verification, etc.)
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
      - extendedWaitUntil:
          notVisible: "Not Now"
          timeout: 3000

# Self-healing: if we booted into OTP screen, log out via the confirm modal
- runFlow:
    when:
      visible:
        id: "otp-logout-button"
    commands:
      - tapOn:
          id: "otp-logout-button"
      - extendedWaitUntil:
          visible:
            id: "confirm-modal-ok"
          timeout: 5000
      - tapOn:
          id: "confirm-modal-ok"

# Self-healing: if keychain clear failed and we booted into Home screen, log out
- runFlow:
    when:
      visible:
        id: "tab-profile"
    commands:
      - tapOn:
          id: "tab-profile"
      - tapOn:
          id: "profile-logout-item"
      - extendedWaitUntil:
          visible:
            id: "confirm-modal-ok"
          timeout: 5000
      - tapOn:
          id: "confirm-modal-ok"

# Self-healing: if we booted into the ParentDashboard, log out via settings → confirm
- runFlow:
    when:
      visible:
        id: "parent-dashboard-settings-button"
    commands:
      - tapOn:
          id: "parent-dashboard-settings-button"
      - extendedWaitUntil:
          visible:
            id: "parent-settings-logout-item"
          timeout: 10000
      - tapOn:
          id: "parent-settings-logout-item"
      - extendedWaitUntil:
          visible:
            id: "confirm-modal-ok"
          timeout: 5000
      - tapOn:
          id: "confirm-modal-ok"

# Finally assert that we are on Onboarding screen (or wait for it if driver was slow)
- extendedWaitUntil:
    visible:
      id: "onboarding-language-toggle"
    timeout: 30000

# If TARGET_ENV is dev, switch to Demo URL
- runFlow:
    when:
      true: ${TARGET_ENV == 'dev'}
    commands:
      - tapOn:
          id: "onboarding-api-switcher-chip"
      - tapOn:
          id: "api-switcher-demo"
      - assertNotVisible:
          id: "onboarding-api-switcher-chip"
      - assertVisible:
          id: "onboarding-api-switcher-chip"

# If TARGET_ENV is prod, switch to Production URL
- runFlow:
    when:
      true: ${TARGET_ENV == 'prod'}
    commands:
      - tapOn:
          id: "onboarding-api-switcher-chip"
      - tapOn:
          id: "api-switcher-production"
      - assertNotVisible:
          id: "onboarding-api-switcher-chip"
      - assertVisible:
          id: "onboarding-api-switcher-chip"

# If TARGET_ENV is prs, switch to PRS URL (PRS is the default so we only assert)
- runFlow:
    when:
      true: ${TARGET_ENV == 'prs'}
    commands:
      - assertVisible:
          id: "onboarding-api-switcher-chip"
