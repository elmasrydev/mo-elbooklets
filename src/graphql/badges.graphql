query GetBadgesScreenData {
  badgeCategories {
    id
    name
    nameAr
    nameEn
    icon
    color
    displayOrder
    badgeCount
  }
  allBadges {
    id
    name
    nameAr
    nameEn
    description
    descriptionAr
    descriptionEn
    logoUrl
    awardedAt
    rulesPreview
    category {
      id
    }
  }
}
