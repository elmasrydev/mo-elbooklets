query getAllBadges {
  allBadges {
    id
    name
    description
    logoUrl
    awardedAt
    rulesPreview
    category {
      id
      name
      icon
      color
    }
    rules {
      id
      conditionType
      operator
      value
      valueEnd
      subject {
        id
        name
      }
      timeframe
      scoreThreshold
      description
    }
  }
}

query getBadgeCategories {
  badgeCategories {
    id
    name
    description
    icon
    color
    badgeCount
  }
}
